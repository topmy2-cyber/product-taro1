<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>열농단 티켓 배부 관리 시스템 - LLM Smart Organizer</title>
    <script>
        const originalWarn = console.warn;
        console.warn = function() {
            if (typeof arguments[0] === 'string' && arguments[0].includes('cdn.tailwindcss.com should not be used in production')) return;
            originalWarn.apply(console, arguments);
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        
        /* Modern Excel Design */
        .table-container { 
            overflow-x: auto; 
            background: white; 
            border-radius: 12px; 
            border: 1px solid #e2e8f0; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05); 
        }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1000px; table-layout: fixed; }
        
        th { 
            background-color: #f1f5f9; 
            color: #475569; 
            font-weight: 700; 
            text-align: center; 
            padding: 14px 10px; 
            border-bottom: 2px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
            font-size: 15px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        th:last-child { border-right: none; }
        
        td { 
            padding: 0; 
            border-bottom: 1px solid #e2e8f0; 
            border-right: 1px solid #e2e8f0; 
            height: 48px;
            vertical-align: middle;
            transition: background-color 0.15s ease;
        }
        td:last-child { border-right: none; }
        tr:last-child td { border-bottom: none; }
        
        tr:hover td { background-color: #f8fafc; }
        
        .input-cell { 
            width: 100%; 
            height: 100%;
            padding: 0 12px;
            background: transparent; 
            border: none; 
            outline: none; 
            font-size: 15px;
            color: #1e293b;
            display: block;
            text-align: center;
        }
        
        .input-cell:focus { 
            background: #fff; 
            box-shadow: inset 0 0 0 2px #3b82f6; 
            border-radius: 4px;
            position: relative;
            z-index: 2;
        }

        .input-cell[readonly], .no-cell {
            background-color: #f8fafc;
            color: #64748b;
            font-weight: 600;
        }
        
        .input-cell[readonly] { cursor: not-allowed; }
        .no-cell { text-align: center; font-size: 13px; }

        input[type="number"] { text-align: center; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        /* Print and PDF Generation Styles */
        @media print {
            button, .no-print, [data-html2canvas-ignore], #login-overlay { display: none !important; }
            body { background-color: #fff !important; }
            .table-container { box-shadow: none !important; border: 1px solid #e2e8f0 !important; }
            th { background-color: #f1f5f9 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .input-cell[readonly], .no-cell { background-color: #f8fafc !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 flex items-center justify-center z-[100] bg-cover bg-center bg-no-repeat" style="background-image: url('./bg.png');">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm"></div>
        <div class="relative z-10 bg-white/95 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-white/20">
            <div class="flex flex-col items-center gap-4 mb-6">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center">
                    <i data-lucide="lock" class="text-blue-600 w-8 h-8"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-800">보안 접근</h2>
                <p class="text-slate-500 text-sm text-center">이 시스템은 승인된 관리자만 접근할 수 있습니다.<br>비밀번호를 입력해주세요.</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="login-password" 
                    class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" 
                    placeholder="비밀번호 입력"
                    onkeypress="if(event.key === 'Enter') checkLogin()">
                <button onclick="checkLogin()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all">
                    로그인
                </button>
                <p id="login-error" class="text-red-500 text-xs text-center hidden">비밀번호가 올바르지 않습니다.</p>
            </div>
        </div>
    </div>

    <div id="main-content" class="max-w-7xl mx-auto hidden">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="ticket" class="text-blue-600"></i> 열농단 티켓 배부 관리 시스템
                </h1>
            </div>
            <div class="flex items-center gap-3">
                <label for="event-date" class="text-sm font-semibold text-slate-600">경기 날짜:</label>
                <select id="event-date" class="border rounded-lg px-3 py-2 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none text-slate-700 cursor-pointer">
                    <option value="[1경기] 4월 11일 (토)">[1경기] 4월 11일 (토)</option>
                    <option value="[2경기] 4월 18일 (토)">[2경기] 4월 18일 (토)</option>
                    <option value="[3경기] 5월 2일 (토)">[3경기] 5월 2일 (토)</option>
                    <option value="[4경기] 5월 6일 (수)">[4경기] 5월 6일 (수)</option>
                    <option value="[5경기] 5월 11일 (월)">[5경기] 5월 11일 (월)</option>
                    <option value="[6경기] 5월 20일 (수)">[6경기] 5월 20일 (수)</option>
                    <option value="[7경기] 6월 13일 (토)">[7경기] 6월 13일 (토)</option>
                    <option value="[8경기] 6월 17일 (수)">[8경기] 6월 17일 (수)</option>
                    <option value="[9경기] 6월 27일 (토)">[9경기] 6월 27일 (토)</option>
                </select>
                <button onclick="downloadPDF(this)" data-html2canvas-ignore class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-lg text-sm font-bold flex items-center gap-2 transition-all shadow-lg shadow-slate-200">
                    <i data-lucide="file-down" class="w-4 h-4"></i> PDF 다운로드
                </button>
            </div>
        </div>

        <!-- Main content area -->
        <!-- Main content area -->
        <div class="space-y-12">
            <!-- Table 1: 출연자 티켓 배부 -->
            <section id="section-performer">
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                    <div class="flex items-center gap-3 flex-wrap">
                        <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="users" class="text-blue-500 w-5 h-5"></i> 출연자 티켓 배부
                        </h3>
                        <div class="flex items-center gap-3 px-5 py-2.5 bg-white border border-slate-200 rounded-full text-sm font-bold shadow-sm">
                            <span class="text-slate-500">일반: <span id="performer-regular-sum" class="text-slate-800 text-base">0</span></span>
                            <span class="text-slate-300">|</span>
                            <span class="text-slate-500">VIP: <span id="performer-vip-sum" class="text-slate-800 text-base">0</span></span>
                            <span class="text-slate-300">|</span>
                            <span class="text-blue-600">총 티켓: <span id="performer-total-sum" class="text-lg">0</span></span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2" data-html2canvas-ignore>
                        <button onclick="toggleAIModal('performer-table')" class="bg-purple-100 hover:bg-purple-200 text-purple-700 text-xs font-bold px-3 py-2 rounded-lg flex items-center gap-1.5 transition-all">
                            <i data-lucide="wand-2" class="w-3.5 h-3.5"></i> AI 스마트 입력
                        </button>
                        <button onclick="addRow('performer-table')" class="bg-blue-50 hover:bg-blue-100 text-blue-600 text-xs font-bold px-3 py-2 rounded-lg flex items-center gap-1 transition-all">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> 행 추가
                        </button>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 table-container">
                    <table id="performer-table">
                        <thead>
                            <tr>
                                <th width="60">NO</th>
                                <th width="100">일반석</th>
                                <th width="100">VIP석</th>
                                <th width="150">이름</th>
                                <th width="150">수령자</th>
                                <th width="100">수령 티켓</th>
                                <th width="180">연락처</th>
                                <th>비고란</th>
                                <th width="50" data-html2canvas-ignore></th>
                            </tr>
                        </thead>
                        <tbody id="performer-body"></tbody>
                    </table>
                </div>
            </section>

            <!-- Table 2: 그 외 배부 -->
            <section id="section-other">
                <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-4">
                    <div class="flex items-center gap-3 flex-wrap">
                        <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                            <i data-lucide="package" class="text-emerald-500 w-5 h-5"></i> 그 외 배부
                        </h3>
                        <div class="flex items-center gap-3 px-5 py-2.5 bg-white border border-slate-200 rounded-full text-sm font-bold shadow-sm">
                            <span class="text-slate-500">일반: <span id="other-regular-sum" class="text-slate-800 text-base">0</span></span>
                            <span class="text-slate-300">|</span>
                            <span class="text-slate-500">VIP: <span id="other-vip-sum" class="text-slate-800 text-base">0</span></span>
                            <span class="text-slate-300">|</span>
                            <span class="text-emerald-600">총 티켓: <span id="other-total-sum" class="text-lg">0</span></span>
                        </div>
                    </div>
                    <div class="flex items-center gap-2" data-html2canvas-ignore>
                        <button onclick="addRow('other-table')" class="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 text-xs font-bold px-3 py-2 rounded-lg flex items-center gap-1 transition-all">
                            <i data-lucide="plus" class="w-3.5 h-3.5"></i> 행 추가
                        </button>
                    </div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 table-container">
                    <table id="other-table">
                        <thead>
                            <tr>
                                <th width="60">NO</th>
                                <th width="100">일반석</th>
                                <th width="100">VIP석</th>
                                <th width="150">이름</th>
                                <th width="150">수령자</th>
                                <th width="100">수령 티켓</th>
                                <th width="180">연락처</th>
                                <th>비고란</th>
                                <th width="50" data-html2canvas-ignore></th>
                            </tr>
                        </thead>
                        <tbody id="other-body"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <!-- AI Smart Input Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4" data-html2canvas-ignore>
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
            <div id="modal-header" class="bg-purple-600 p-4 flex justify-between items-center text-white">
                <h3 id="modal-title" class="font-bold flex items-center gap-2"><i data-lucide="sparkles" class="w-5 h-5"></i> AI 스마트 데이터 정리</h3>
                <button onclick="toggleAIModal()" class="hover:bg-purple-500 p-1 rounded-lg transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6">
                <p id="modal-desc" class="text-sm text-slate-500 mb-4">비정형 텍스트를 입력하거나, 파일을 첨부하여 시트를 채울 수 있습니다.</p>
                <div class="mb-4">
                    <input type="file" id="file-upload" class="hidden" onchange="handleFileSelect(this)">
                    <button id="file-dropzone" onclick="document.getElementById('file-upload').click()" class="w-full border-2 border-dashed border-slate-200 hover:border-purple-300 hover:bg-purple-50 rounded-xl p-6 flex flex-col items-center gap-3 transition-all relative overflow-hidden group">
                        <div class="absolute inset-0 bg-purple-100 opacity-0 group-[.dragover]:opacity-50 transition-opacity"></div>
                        <i data-lucide="upload-cloud" class="text-slate-400 group-[.dragover]:text-purple-600 group-[.dragover]:scale-110 transition-transform w-8 h-8 relative z-10"></i>
                        <div class="relative z-10 text-center">
                            <span class="block text-sm font-bold text-slate-600 group-[.dragover]:text-purple-700">엑셀/사진/텍스트 파일 첨부하거나 <br/>여기로 끌어다 놓으세요</span>
                            <span class="block text-xs text-slate-400 mt-1">파일에서 정보를 추출하여 AI가 정리합니다. (스크린샷 붙여넣기 지원)</span>
                        </div>
                    </button>
                </div>
                <div class="relative">
                    <textarea id="ai-input" rows="5" 
                        class="w-full border-2 border-slate-200 rounded-xl p-4 text-sm focus:border-purple-500 outline-none mb-4 transition-all" 
                        placeholder="파일을 첨부하거나 텍스트를 직접 입력해주세요."></textarea>
                    <div id="file-loading" class="absolute inset-0 bg-white/80 hidden items-center justify-center rounded-xl">
                        <div class="w-6 h-6 border-2 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                    </div>
                </div>
                <div class="flex flex-col gap-3">
                    <button id="btn-parse" onclick="handleAIParse()" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-purple-200">
                        <i data-lucide="wand-2" class="w-5 h-5"></i> <span id="btn-text">데이터 추가</span>
                    </button>
                    <button onclick="toggleAIModal()" class="w-full text-slate-400 text-sm hover:text-slate-600 font-medium">취소</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-50" data-html2canvas-ignore>
        <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="font-bold text-slate-700">AI가 데이터를 분석 중입니다...</p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
