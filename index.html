<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>티켓 배부 관리 시스템 - LLM Smart Organizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; }
        
        /* Excel Style Grid */
        .table-container { overflow-x: auto; background: white; border-radius: 8px; border: 1px solid #cbd5e1; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; table-layout: fixed; }
        
        th { 
            background-color: #f8fafc; 
            color: #475569; 
            font-weight: 700; 
            text-align: center; 
            padding: 10px; 
            border: 1px solid #cbd5e1;
            font-size: 13px;
            position: sticky;
            top: 0;
        }
        
        td { 
            padding: 0; 
            border: 1px solid #cbd5e1; 
            height: 38px;
            vertical-align: middle;
        }
        
        tr:hover { background-color: #f8fafc; }
        
        /* Input styling to look like a cell */
        .input-cell { 
            width: 100%; 
            height: 100%;
            padding: 0 10px;
            background: transparent; 
            border: none; 
            outline: none; 
            font-size: 14px;
            color: #1e293b;
            display: block;
        }
        
        .input-cell:focus { 
            background: #fff; 
            box-shadow: inset 0 0 0 2px #3b82f6; 
            z-index: 10;
        }
        
        .no-cell { 
            background-color: #f8fafc; 
            text-align: center; 
            font-weight: 600; 
            color: #64748b;
            font-size: 12px;
        }

        /* Number alignment */
        input[type="number"] { text-align: center; }
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8">
    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 bg-slate-900 flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-200">
            <div class="flex flex-col items-center gap-4 mb-6">
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center">
                    <i data-lucide="lock" class="text-blue-600 w-8 h-8"></i>
                </div>
                <h2 class="text-xl font-bold text-slate-800">보안 접근</h2>
                <p class="text-slate-500 text-sm text-center">이 시스템은 승인된 관리자만 접근할 수 있습니다.<br>비밀번호를 입력해주세요.</p>
            </div>
            <div class="space-y-4">
                <input type="password" id="login-password" 
                    class="w-full border rounded-lg px-4 py-3 focus:ring-2 focus:ring-blue-500 outline-none" 
                    placeholder="비밀번호 입력"
                    onkeypress="if(event.key === 'Enter') checkLogin()">
                <button onclick="checkLogin()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-all">
                    로그인
                </button>
                <p id="login-error" class="text-red-500 text-xs text-center hidden">비밀번호가 올바르지 않습니다.</p>
            </div>
        </div>
    </div>

    <div id="main-content" class="max-w-7xl mx-auto hidden">
        <!-- Header -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                    <i data-lucide="ticket" class="text-blue-600"></i> 티켓 배부 관리 시스템
                </h1>
                <p class="text-slate-500 text-sm">LLM을 통해 텍스트 데이터를 자동으로 시트에 정리합니다.</p>
            </div>
            <div class="flex items-center gap-3">
                <label for="event-date" class="text-sm font-semibold text-slate-600">행사 날짜:</label>
                <input type="date" id="event-date" class="border rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <!-- Main content area (without LLM section) -->
        <div class="space-y-12">
            <!-- Table 1: 출연자 티켓 배부 -->
            <section>
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="users" class="text-blue-500 w-5 h-5"></i> 출연자 티켓 배부
                    </h3>
                    <button onclick="addRow('performer-table')" class="text-blue-600 text-sm font-bold flex items-center gap-1 hover:underline">
                        <i data-lucide="plus" class="w-4 h-4"></i> 행 추가
                    </button>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 table-container">
                    <table id="performer-table">
                        <thead>
                            <tr>
                                <th width="60">NO</th>
                                <th width="100">일반석</th>
                                <th width="100">VIP석</th>
                                <th width="150">이름</th>
                                <th width="100">총 티켓</th>
                                <th width="150">수령자</th>
                                <th width="100">수령 티켓</th>
                                <th width="180">연락처</th>
                                <th>비고란</th>
                                <th width="50"></th>
                            </tr>
                        </thead>
                        <tbody id="performer-body">
                            <!-- Rows will be added here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Table 2: 그 외 배부 -->
            <section>
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="package" class="text-emerald-500 w-5 h-5"></i> 그 외 배부
                    </h3>
                    <button onclick="addRow('other-table')" class="text-emerald-600 text-sm font-bold flex items-center gap-1 hover:underline">
                        <i data-lucide="plus" class="w-4 h-4"></i> 행 추가
                    </button>
                </div>
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 table-container">
                    <table id="other-table">
                        <thead>
                            <tr>
                                <th width="60">NO</th>
                                <th width="100">일반석</th>
                                <th width="100">VIP석</th>
                                <th width="150">이름</th>
                                <th width="100">총 티켓</th>
                                <th width="150">수령자</th>
                                <th width="100">수령 티켓</th>
                                <th width="180">연락처</th>
                                <th>비고란</th>
                                <th width="50"></th>
                            </tr>
                        </thead>
                        <tbody id="other-body">
                            <!-- Rows will be added here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <!-- Floating AI Button -->
    <button onclick="toggleAIModal()" class="fixed bottom-8 right-8 w-16 h-16 bg-purple-600 hover:bg-purple-700 text-white rounded-full shadow-2xl flex items-center justify-center transition-all hover:scale-110 z-40 group">
        <i data-lucide="wand-2" class="w-8 h-8"></i>
        <span class="absolute right-20 bg-slate-800 text-white text-xs px-3 py-1.5 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap shadow-lg">AI 스마트 입력</span>
    </button>

    <!-- AI Smart Input Modal -->
    <div id="ai-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl border border-slate-200 overflow-hidden">
            <div class="bg-purple-600 p-4 flex justify-between items-center text-white">
                <h3 class="font-bold flex items-center gap-2"><i data-lucide="sparkles" class="w-5 h-5"></i> AI 스마트 데이터 정리</h3>
                <button onclick="toggleAIModal()" class="hover:bg-purple-500 p-1 rounded-lg transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="p-6">
                <p class="text-sm text-slate-500 mb-4">비정형 텍스트를 입력하면 AI가 자동으로 시트에 분류하여 추가합니다.</p>
                <textarea id="ai-input" rows="6" 
                    class="w-full border-2 border-slate-200 rounded-xl p-4 text-sm focus:border-purple-500 outline-none mb-4 transition-all" 
                    placeholder="예: '출연자 홍길동 VIP 2매, 일반 1매, 본인 수령, 010-1234-5678'"></textarea>
                <div class="flex flex-col gap-3">
                    <button id="btn-parse" class="w-full bg-purple-600 hover:bg-purple-700 text-white py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 shadow-lg shadow-purple-200">
                        <i data-lucide="wand-2" class="w-5 h-5"></i> 데이터 분석 및 시트 추가
                    </button>
                    <button onclick="toggleAIModal()" class="w-full text-slate-400 text-sm hover:text-slate-600 font-medium">취소하고 돌아가기</button>
                </div>
            </div>
        </div>
    </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="font-bold text-slate-700">AI가 데이터를 정리 중입니다...</p>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
